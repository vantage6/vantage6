apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-headless-service
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  clusterIP: None
  selector:
{{ include "node.matchLabels" . | indent 4 }}
    component: node
  ports:
  - name: proxy-port
    port: 8080
    targetPort: 8080