apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-node-statefulset
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
{{ include "node.labels" . | indent 4 }}
    component: node
spec:
  serviceName: {{ .Release.Name }}-headless-service
  replicas: {{ .Values.node.replicas | default 1 }}
  selector:
    matchLabels:
{{ include "node.matchLabels" . | indent 6 }}
      component: node
  template:
    metadata:
      labels:
{{ include "node.labels" . | indent 8 }}
        component: node
    spec:
      serviceAccountName: {{ .Release.Name }}-node-serviceaccount
      containers:
      - name: vantage6-node
        image: {{ .Values.node.image }}
        ports:
          - containerPort: 8080
        env:
        - name: PROXY_SERVER_PORT
          value: "{{ (index .Values.node.proxyPorts 0).port}}"
        command: ["vnode-local", "start", "-c", "/app/config/config.yml", "--dockerized"]
        volumeMounts:
        - name: task-files-root
          mountPath: /app/tasks
        - name: config-volume
          mountPath: /app/config
        {{- range .Values.node.databases.fileBased }}
        - name: database-volume-{{ .name }}
          mountPath: /app/databases/{{ .name }}.{{ .type }}
        {{- end }}
      volumes:
      {{- range .Values.node.databases.fileBased }}
      - name: database-volume-{{ .name }}
        hostPath:
          path: {{ .uri }}
          type: File
      {{- end }}
      - name: task-files-root
        hostPath:
          path: {{ .Values.node.taskDirHost }}
          type: DirectoryOrCreate
      - name: config-volume
        configMap:
          name: {{ .Release.Name }}-node-configmap
