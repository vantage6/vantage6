# Default values for the hub parent chart.
#
# The keys below correspond to the subchart names so that their values.yaml
# structures can be provided from this single hub chart values file.
hq:
  enabled: true
  # Copy or override values from charts/hq/values.yaml here as needed, e.g.:

auth:
  enabled: true
  # Copy or override values from charts/auth/values.yaml here as needed.

store:
  enabled: true
  # Copy or override values from charts/store/values.yaml here as needed.

hubIngress:
  enabled: false

  # Public hostnames per component (subdomain routing).
  # Example: auth.example.com, hq.example.com, portal.example.com, store.example.com
  hosts:
    auth: ""
    hq: ""
    portal: ""
    store: ""

  # TLS configuration for all ingresses.
  tls:
    # Use cert-manager by default, or reference an existing secret.
    mode: cert-manager # or: existingSecret

    # Optional per-component secret name overrides.
    # - In cert-manager mode, Certificates will be created for these secrets.
    # - In existingSecret mode, these secrets must already exist.
    existingSecrets:
      auth: ""
      hq: ""
      portal: ""
      store: ""

  certManager:
    enabled: true
    clusterIssuer: letsencrypt-prod
    # When set to true and an email is provided, the hub chart will create a
    # ClusterIssuer resource using cert-manager. Leave this false if your
    # cluster already has a suitable ClusterIssuer.
    createClusterIssuer: false
    # Email address to register with the ACME server (required when
    # createClusterIssuer is true).
    email: ""
    # ACME server URL for the ClusterIssuer. Defaults to Let's Encrypt
    # production endpoint if left empty.
    server: ""

global:
  # Shared Keycloak configuration (used as default if subcharts don't override)
  keycloak:
    url: ""
    realm: "vantage6"
    adminClient: "backend-admin-client"
    publicClient: "public_client"
  # Shared public URLs (used as defaults for HQ and Store)
  urls:
    external:
      auth: ""
      store: ""
      ui: ""
      hq: ""
    internal:
      auth: ""
      store: ""
      ui: ""
      hq: ""
  # Optional shared node name for local storage (logs/prometheus)
  k8sNodeName: ""

  # Optional shared wait settings used by initContainers in HQ and Store
  # when deploying via the hub chart. By default these are disabled so
  # standalone charts are unaffected; enable them and set internal URLs
  # to have HQ/Store wait for Auth (and HQ wait for Store).
  wait:
    auth:
      enabled: true
      maxAttempts: 60
      intervalSeconds: 5
      image: "curlimages/curl:8.7.1"
    store:
      enabled: true
      maxAttempts: 60
      intervalSeconds: 5
      image: "curlimages/curl:8.7.1"
