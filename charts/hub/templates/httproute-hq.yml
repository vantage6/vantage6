{{- $hg := .Values.hubGateway | default (dict) -}}
{{- $hosts := $hg.hosts | default (dict) -}}
{{- $hqHost := get $hosts "hq" | default "" -}}
{{- if and ($hg.enabled | default false) (ne (trim $hqHost) "") -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-hq-route
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Release.Name }}-gateway
      sectionName: hq
  hostnames:
    - {{ $hqHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-hq
          port: {{ .Values.hq.port }}
{{- end }}
