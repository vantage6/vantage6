{{- $hg := .Values.hubGateway | default (dict) -}}
{{- $hosts := $hg.hosts | default (dict) -}}
{{- $storeHost := get $hosts "store" | default "" -}}
{{- if and ($hg.enabled | default false) (ne (trim $storeHost) "") -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-store-route
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Release.Name }}-gateway
      sectionName: store
  hostnames:
    - {{ $storeHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-store
          port: {{ .Values.store.port }}
{{- end }}

