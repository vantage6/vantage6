{{- $hi := .Values.hubIngress | default (dict) -}}
{{- $hosts := $hi.hosts | default (dict) -}}
{{- $authHost := get $hosts "auth" | default "" -}}
{{- $authCfg := .Values.auth | default (dict) -}}
{{- $authKeycloak := $authCfg.keycloak | default (dict) -}}
{{- $behindIngress := and ($authKeycloak.behindIngress | default (dict)) (($authKeycloak.behindIngress | default (dict)).enabled | default false) -}}
{{- if and ($hi.enabled | default false) (ne (trim $authHost) "") $behindIngress -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-auth
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ $authHost | quote }}
      secretName: {{ include "hub.tlsSecretName" (dict "ctx" . "component" "auth") }}
  rules:
    - host: {{ $authHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-kc
                port:
                  name: http
{{- end }}

