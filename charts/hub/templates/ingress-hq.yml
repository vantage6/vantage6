{{- $hi := .Values.hubIngress | default (dict) -}}
{{- $hosts := $hi.hosts | default (dict) -}}
{{- $hqHost := get $hosts "hq" | default "" -}}
{{- if and ($hi.enabled | default false) (ne (trim $hqHost) "") -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-hq
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ $hqHost | quote }}
      secretName: {{ include "hub.tlsSecretName" (dict "ctx" . "component" "hq") }}
  rules:
    - host: {{ $hqHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-hq
                port:
                  name: v6-hq-backend
{{- end }}
