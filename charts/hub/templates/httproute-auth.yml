{{- $hg := .Values.hubGateway | default (dict) -}}
{{- $hosts := $hg.hosts | default (dict) -}}
{{- $authHost := get $hosts "auth" | default "" -}}
{{- $authCfg := .Values.auth | default (dict) -}}
{{- $authKeycloak := $authCfg.keycloak | default (dict) -}}
{{- $behindGateway := and ($authKeycloak.behindGateway | default (dict)) (($authKeycloak.behindGateway | default (dict)).enabled | default false) -}}
{{- if and ($hg.enabled | default false) (ne (trim $authHost) "") $behindGateway -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-auth-route
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Release.Name }}-gateway
      sectionName: auth
  hostnames:
    - {{ $authHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-kc
          port: 7680
{{- end }}
