{{- $hi := .Values.hubIngress | default (dict) -}}
{{- $hosts := $hi.hosts | default (dict) -}}
{{- $portalHost := get $hosts "portal" | default "" -}}
{{- if and ($hi.enabled | default false) (ne (trim $portalHost) "") -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-portal
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ $portalHost | quote }}
      secretName: {{ include "hub.tlsSecretName" (dict "ctx" . "component" "portal") }}
  rules:
    - host: {{ $portalHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-ui
                port:
                  name: vantage6-ui
{{- end }}

