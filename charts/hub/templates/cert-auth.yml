{{- $hi := .Values.hubIngress | default (dict) -}}
{{- $hosts := $hi.hosts | default (dict) -}}
{{- $authHost := get $hosts "auth" | default "" -}}
{{- $tls := $hi.tls | default (dict) -}}
{{- $cm := $hi.certManager | default (dict) -}}
{{- $authCfg := .Values.auth | default (dict) -}}
{{- $authKeycloak := $authCfg.keycloak | default (dict) -}}
{{- $behindIngress := and ($authKeycloak.behindIngress | default (dict)) (($authKeycloak.behindIngress | default (dict)).enabled | default false) -}}
{{- if and ($hi.enabled | default false) (eq ($tls.mode | default "cert-manager") "cert-manager") ($cm.enabled | default true) (ne (trim $authHost) "") $behindIngress -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-auth
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  secretName: {{ include "hub.tlsSecretName" (dict "ctx" . "component" "auth") }}
  dnsNames:
    - {{ $authHost | quote }}
  issuerRef:
    kind: ClusterIssuer
    name: {{ $cm.clusterIssuer | default "letsencrypt-prod" | quote }}
{{- end }}

