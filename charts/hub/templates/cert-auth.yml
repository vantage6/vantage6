{{- $hg := .Values.hubGateway | default (dict) -}}
{{- $hosts := $hg.hosts | default (dict) -}}
{{- $authHost := get $hosts "auth" | default "" -}}
{{- $tls := $hg.tls | default (dict) -}}
{{- $cm := $hg.certManager | default (dict) -}}
{{- $authCfg := .Values.auth | default (dict) -}}
{{- $authKeycloak := $authCfg.keycloak | default (dict) -}}
{{- $behindGateway := and ($authKeycloak.behindGateway | default (dict)) (($authKeycloak.behindGateway | default (dict)).enabled | default false) -}}
{{- if and ($hi.enabled | default false) (eq ($tls.mode | default "cert-manager") "cert-manager") ($cm.enabled | default true) (ne (trim $authHost) "") $behindGateway -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-auth
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  secretName: {{ include "hub.tlsSecretName" (dict "ctx" . "component" "auth") }}
  dnsNames:
    - {{ $authHost | quote }}
  issuerRef:
    kind: ClusterIssuer
    name: {{ $cm.clusterIssuer | default "letsencrypt-prod" | quote }}
{{- end }}

