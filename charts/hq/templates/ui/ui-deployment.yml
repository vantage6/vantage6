{{- $global := .Values.global | default (dict) -}}
{{- $urls := $global.urls | default (dict) -}}
{{- $external := $urls.external | default (dict) -}}
{{- $uiKeycloak := (default ($global.keycloak | default (dict)) .Values.ui.keycloak) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ui
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
{{ include "vantage6.labels" . | indent 4 }}
    component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "vantage6.matchLabels" . | indent 6 }}
      component: ui
  template:
    metadata:
      labels:
{{ include "vantage6.labels" . | indent 8 }}
        component: ui
    spec:
      containers:
      - name: vantage6-ui
        image: {{ .Values.ui.image }}
        imagePullPolicy: {{ .Values.ui.imagePullPolicy | default "Always" }}
        ports:
        - containerPort: 80
        env:
        - name: HQ_URL
          value: {{ default $external.hq .Values.hq.baseUrl | quote }}
        - name: API_PATH
          value: {{ .Values.hq.apiPath | quote }}
        - name: AUTH_URL
          value: {{ default $external.auth $uiKeycloak.publicUrl | quote }}
        - name: KEYCLOAK_REALM
          value: {{ $uiKeycloak.realm | quote }}
        - name: KEYCLOAK_CLIENT
          value: {{ $uiKeycloak.publicClient | quote }}
        # set the length of the refresh token. This is the time before keycloak-angular
        # automatically logs out the user.
        - name: REFRESH_TOKEN_VALIDITY_SECONDS
          value: "1800" # 30 minutes - the keycloak default
        # Algorithm store URLs for Bearer token inclusion and for CSP header policies
        - name: ALLOWED_ALGORITHM_STORES
          value: {{ .Values.ui.allowedAlgorithmStores | default "*" | quote }}
        # Community store URL
        - name: COMMUNITY_STORE_URL
          value: {{ .Values.ui.communityStoreUrl | default "https://store.uluru.vantage6.ai" | quote }}
        - name: COMMUNITY_STORE_API_PATH
          value: {{ .Values.ui.communityStoreApiPath | default "/api" | quote }}