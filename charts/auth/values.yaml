keycloak:

  standalone: true

  instances: 1
  hostname: ""

  # When Keycloak is exposed through an Ingress that terminates TLS, Keycloak
  # should run HTTP inside the cluster and trust proxy headers.
  behindIngress:
    enabled: false
    # How the proxy communicates original scheme/host.
    # See Keycloak reverse proxy docs: 'xforwarded' (X-Forwarded-*) or 'forwarded' (Forwarded).
    proxyHeaders: xforwarded
    httpPort: 7680

  # note that dependent on the production setting, the users and secrets that are
  # set are different - for non-production, they are set to simple, non-secure values.
  production: true
  tls:
    enabled: true
    autoGenerated: true

  resources:
    limits:
      memory: 2Gi
      cpu: 1000m
    requests:
      memory: 1Gi
      cpu: 500m

  realmImport:
    enabled: true
    accessTokenLifespan: 300
    ssoSessionIdleTimeout: 1800
    passwordPolicy: "length(8) and upperCase(1) and lowerCase(1) and digits(1) and specialChars(1)"
    resetPasswordAllowed: false
    verifyEmail: false
    bruteForceProtected: true
    permanentLockout: false
    failureFactor: 5
    smtpServer:
      # placeholder for SMTP server configuration
    publicClient:
      name: public_client


# PostgreSQL configuration for Keycloak
database:
  external: true
  host: ""
  username: ""
  password: ""
  name: ""
