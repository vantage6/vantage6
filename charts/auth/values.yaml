keycloak:
  instances: 1
  hostname: ""

  production: true
  tls:
    enabled: true
    autoGenerated: true

  resources:
    limits:
      memory: 2Gi
      cpu: 1000m
    requests:
      memory: 1Gi
      cpu: 500m

  realmImport:
    enabled: true
    realm: vantage6
    accessTokenLifespan: 300
    ssoSessionIdleTimeout: 1800
    passwordPolicy: "length(8) and upperCase(1) and lowerCase(1) and digits(1) and specialChars(1)"
    resetPasswordAllowed: false
    verifyEmail: false
    bruteForceProtected: true
    permanentLockout: false
    failureFactor: 5
    requiredActions:
      - alias: CONFIGURE_TOTP
        name: Configure OTP
        providerId: CONFIGURE_TOTP
        enabled: true
        defaultAction: true
        priority: 10
      - alias: UPDATE_PASSWORD
        name: Update Password
        providerId: UPDATE_PASSWORD
        enabled: true
        defaultAction: true
        priority: 20
      - alias: UPDATE_EMAIL
        name: Update Email
        providerId: UPDATE_EMAIL
        enabled: true
        defaultAction: true
        priority: 30
    users:
      # Placeholder for users.
      # Vantage6 requires at least:
      # - an admin user (the initial vantage6 admin user)
      # - a service account user for the backend admin client
      # These users are initialized when constructing a values.yaml through the vantage6
      # CLI.
    clients:
      # Placeholder for clients.
      # Vantage6 requires at least:
      # - a public client for users to authenticate in the browser
      # - a backend admin client for the backend to manage users and clients in
      # keycloak.
      # These clients are initialized when constructing a values.yaml through the
      # vantage6 CLI.
    smtpServer:
      # placeholder for SMTP server configuration

# PostgreSQL configuration for Keycloak
database:
  external: true
  host: ""
  username: ""
  password: ""
  name: ""
  # k8sNodeName: ""  # Required when external is false for internal DB. Omit or leave empty only when using external DB.
