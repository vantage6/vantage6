{{- $global := .Values.global | default (dict) }}
{{- if not (lookup "v1" "Secret" (.Values.namespace | default .Release.Namespace) (printf "%s-store-secrets" .Release.Name)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-store-secrets
  namespace: {{ .Values.namespace | default .Release.Namespace }}
data:
  KEYCLOAK_ADMIN_USERNAME: {{
    (default $global.keycloak .Values.store.keycloak).adminUsername | b64enc
  }}
  KEYCLOAK_ADMIN_PASSWORD: {{
    (default $global.keycloak .Values.store.keycloak).adminPassword | b64enc
  }}
  KEYCLOAK_ADMIN_CLIENT: {{
    (default $global.keycloak .Values.store.keycloak).adminClient | b64enc
  }}
  KEYCLOAK_ADMIN_CLIENT_SECRET: {{
    (default $global.keycloak .Values.store.keycloak).adminClientSecret | b64enc
  }}
{{- end }}