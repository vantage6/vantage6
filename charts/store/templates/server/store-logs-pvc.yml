{{- $global := .Values.global | default (dict) }}
{{- if and (not (lookup "v1" "PersistentVolumeClaim" "" (printf "%s-store-logs-pvc" .Release.Name))) (ne (.Values.database.k8sNodeName | default $global.k8sNodeName) "") }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-store-logs-pvc
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
{{ include "store.labels" . | indent 4 }}
    component: vantage6-store-logs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.store.logging.storageSize | default "128M" }}
  storageClassName: {{ .Values.store.logging.storageClass }}
  selector:
    matchLabels:
      type: local-logs
      app: vantage6-store
{{- end }}
